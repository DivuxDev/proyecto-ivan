services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tagmap_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tagmap_pass}
      POSTGRES_DB: ${POSTGRES_DB:-tagmap_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tagmap_user} -d ${POSTGRES_DB:-tagmap_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tagmap_user}:${POSTGRES_PASSWORD:-tagmap_pass}@db:5432/${POSTGRES_DB:-tagmap_db}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production_min_32_chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      PORT: 4000
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      # Folder Watcher (modo NAS)
      ENABLE_FOLDER_WATCHER: ${ENABLE_FOLDER_WATCHER:-false}
      WATCH_FOLDERS_DIR: ${WATCH_FOLDERS_DIR:-/share/TagMapFotos}
      SCAN_INTERVAL_SECONDS: ${SCAN_INTERVAL_SECONDS:-60}
    volumes:
      # Carpeta donde el backend guarda fotos optimizadas
      # En QNAP: cambia por /share/TagMapUploads:/app/uploads
      - ${UPLOADS_PATH:-uploads_data}:/app/uploads
      # Carpeta de equipos para auto-importación (solo si ENABLE_FOLDER_WATCHER=true)
      # En QNAP: cambia por /share/TagMapFotos:/share/TagMapFotos:ro
      # El :ro es opcional (read-only) para mayor seguridad
      - ${WATCH_FOLDERS_PATH:-watch_folders_data}:/share/TagMapFotos

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        INTERNAL_API_URL: http://backend:4000
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      INTERNAL_API_URL: http://backend:4000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  # uploads_data solo se usa si UPLOADS_PATH no está definido
  uploads_data:
  # watch_folders_data solo se usa si WATCH_FOLDERS_PATH no está definido
  watch_folders_data:
